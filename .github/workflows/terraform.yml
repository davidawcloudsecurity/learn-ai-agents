# This is a basic workflow to help you get started with Actions
name: learn-ai-agents-apply

# Controls when the action will run. Invokes the workflow on push events but only for the main branch
on:
  workflow_dispatch:

env:
  
  AWS_REGION : "us-east-1" #Change to reflect your Region
  IAM_ROLE_NAME: "demo-project-ec2-role"
  IAM_PROFILE_NAME: "demo-project-ec2-profile"

# Permission can be added at job level or workflow level    
permissions:
      id-token: write   # This is required for requesting the JWT
      contents: write    # This is required for actions/checkout
jobs:
  AssumeRoleAndCallIdentity:
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v3  
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: arn:aws:iam::762595429056:role/GithubActions #change to reflect your IAM role’s ARN
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      # Hello from AWS: WhoAmI
      - name: Sts GetCallerIdentity
        run: |
          aws sts get-caller-identity
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        
      # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
      - name: Terraform Init
        run: |
          # Pull existing state from destroy/main branch if it exists
          echo "Checking for existing Terraform state..."
          git fetch origin destroy/main 2>/dev/null || echo "destroy/main branch doesn't exist yet"
          if git show-branch remotes/origin/destroy/main 2>/dev/null; then
              echo "Found destroy/main branch, checking for state files..."
              git checkout destroy/main
              if [ -d "state" ] && [ -f "state/terraform.tfstate" ]; then
                  echo "Found existing state, copying to working directory..."
                  cp state/terraform.tfstate ./terraform.tfstate
              fi
              git checkout feat/aws/main/learn-claudecode
          fi
          
          # Clean up any orphaned IAM resources before applying
          echo "Cleaning up any existing IAM resources..."
          
          # Detach all managed policies from the role
          POLICIES=$(aws iam list-attached-role-policies --role-name ${{ env.IAM_ROLE_NAME }} --query 'AttachedPolicies[*].PolicyArn' --output text 2>/dev/null || true)
          for POLICY_ARN in $POLICIES; do
            aws iam detach-role-policy --role-name ${{ env.IAM_ROLE_NAME }} --policy-arn "$POLICY_ARN" 2>/dev/null || true
          done
          
          # Delete all inline policies from the role
          INLINE_POLICIES=$(aws iam list-role-policies --role-name ${{ env.IAM_ROLE_NAME }} --query 'PolicyNames[*]' --output text 2>/dev/null || true)
          for POLICY_NAME in $INLINE_POLICIES; do
            aws iam delete-role-policy --role-name ${{ env.IAM_ROLE_NAME }} --policy-name "$POLICY_NAME" 2>/dev/null || true
          done
          
          # Remove role from instance profile, delete profile, then delete role
          aws iam remove-role-from-instance-profile --instance-profile-name ${{ env.IAM_PROFILE_NAME }} --role-name ${{ env.IAM_ROLE_NAME }} 2>/dev/null || true
          aws iam delete-instance-profile --instance-profile-name ${{ env.IAM_PROFILE_NAME }} 2>/dev/null || true
          aws iam delete-role --role-name ${{ env.IAM_ROLE_NAME }} 2>/dev/null || true
          
          terraform init
          terraform fmt
          terraform validate
          terraform plan
          terraform apply --auto-approve
        working-directory: infra_terraform

      - name: Push tfstate to destroy/main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/davidawcloudsecurity/learn-ai-agents.git
          
          COMMIT_HASH=$(git rev-parse --short HEAD)
          
          # Save tfstate and main.tf before switching branches
          cp terraform.tfstate /tmp/terraform.tfstate
          cp main.tf /tmp/main.tf
          cp variables.tf /tmp/variables.tf
          
          # Save lock file if it exists
          if [ -f .terraform.lock.hcl ]; then
            cp .terraform.lock.hcl /tmp/.terraform.lock.hcl
          fi
          
          # Switch to destroy/main branch
          git fetch origin destroy/main 2>/dev/null || true
          if git show-branch remotes/origin/destroy/main 2>/dev/null; then
            git checkout destroy/main
            git merge origin/destroy/main --no-edit 2>/dev/null || true
          else
            git checkout --orphan destroy/main
            git rm -rf . 2>/dev/null || true
          fi
          
          # Copy state into state/ directory
          mkdir -p state
          cp /tmp/terraform.tfstate state/terraform.tfstate
          cp /tmp/main.tf main.tf
          cp /tmp/variables.tf variables.tf
          if [ -f /tmp/.terraform.lock.hcl ]; then
            cp /tmp/.terraform.lock.hcl .terraform.lock.hcl
            git add .terraform.lock.hcl
          fi
          
          # Commit and push
          git add state/terraform.tfstate main.tf variables.tf
          git commit -m "update tfstate and config - ${COMMIT_HASH}" || echo "No changes to commit"
          git push origin destroy/main
        working-directory: infra_terraform

      - name: Terraform Destroy on Failure
        if: failure()
        run: |
          terraform destroy -auto-approve -input=false
          # Force cleanup any remaining IAM resources that Terraform might have missed
          aws iam delete-role --role-name ${{ env.IAM_ROLE_NAME }} 2>/dev/null || true
          aws iam delete-instance-profile --instance-profile-name ${{ env.IAM_PROFILE_NAME }} 2>/dev/null || true
        working-directory: infra_terraform
